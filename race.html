<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Race Analysis</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; }

    .sidebar {
      width: 200px; min-height: 100vh; background: #1a1a1a;
      border-right: 1px solid #2a2a2a; padding: 1.5rem 1rem;
      position: fixed; top: 0; left: 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
    .f1-badge { background: #e10600; color: #fff; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 4px; letter-spacing: 1px; }
    .sidebar-title { font-size: 15px; font-weight: 500; color: #fff; }
    .sidebar a { text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 6px; color: #888; display: block; }
    .sidebar a:hover { color: #ccc; background: #222; }
    .sidebar a.active { color: #fff; background: #2a2a2a; border-left: 3px solid #e10600; }

    select { background: #2a2a2a; color: #f0f0f0; border: 1px solid #3a3a3a; border-radius: 6px; padding: 6px 12px; font-size: 14px; cursor: pointer; }

    .main { margin-left: 200px; max-width: 960px; padding: 2rem 1.5rem; }

    .controls-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .controls-bar label { font-size: 13px; color: #888; margin-right: 4px; }

    .btn { background: #e10600; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .race-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
    .race-sub { font-size: 13px; color: #666; margin-bottom: 1.5rem; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }

    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 1.25rem; }
    .card-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }

    .chart-wrap-tall { position: relative; height: 460px; }

    .podium { display: flex; align-items: flex-end; gap: 12px; justify-content: center; padding: 1rem 0 0; }
    .podium-step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .podium-photo { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: #2a2a2a; border: 2px solid #333; }
    .podium-photo-placeholder { width: 64px; height: 64px; border-radius: 50%; background: #2a2a2a; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #555; }
    .podium-name { font-size: 12px; color: #ccc; text-align: center; font-weight: 500; }
    .podium-team-label { font-size: 11px; color: #666; text-align: center; }
    .podium-block { width: 80px; border-radius: 6px 6px 0 0; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; }
    .p1 { height: 100px; background: #c9a227; }
    .p2 { height: 70px; background: #6c757d; }
    .p3 { height: 50px; background: #944f00; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 6px 10px; color: #555; font-weight: 400; font-size: 11px; border-bottom: 1px solid #2a2a2a; text-transform: uppercase; }
    td { padding: 10px 10px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #222; }

    .pos-badge { display: inline-block; width: 22px; height: 22px; border-radius: 50%; background: #2a2a2a; color: #888; font-size: 11px; font-weight: 600; text-align: center; line-height: 22px; }
    .pos-badge.p1b { background: #c9a22722; color: #c9a227; }
    .pos-badge.p2b { background: #6c757d22; color: #aaa; }
    .pos-badge.p3b { background: #944f0022; color: #c47a30; }

    .team-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .driver-name { font-weight: 500; color: #fff; }
    .muted { color: #666; }

    .pit-stop { display: inline-block; background: #e1060015; color: #e10600; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
    .incident-badge { display: inline-block; background: #ff880015; color: #ff8800; font-size: 10px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .dnf-badge { display: inline-block; background: #e1060015; color: #e10600; font-size: 10px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }

    .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e1e1e; font-size: 13px; }
    .stat-row:last-child { border-bottom: none; }
    .stat-key { color: #888; }
    .stat-val { color: #fff; font-weight: 500; }

    .loading { padding: 3rem; text-align: center; color: #555; font-size: 14px; }
    .empty { padding: 2rem; text-align: center; color: #555; font-size: 13px; }

    .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #2a2a2a; }
    .tab-btn { background: transparent; border: none; color: #666; font-size: 14px; padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #fff; border-bottom-color: #e10600; font-weight: 500; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .chart-note { font-size: 12px; color: #555; margin-top: 8px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <span class="f1-badge">F1</span>
    <span class="sidebar-title">Stats</span>
  </div>
  <a href="index.html">Season standings</a>
  <a href="race.html" class="active">Race analysis</a>
  <a href="telemetry.html">Telemetry</a>
</div>

<div class="main">

  <div class="controls-bar">
    <label>Season</label>
    <select id="seasonSel"></select>
    <label>Round</label>
    <select id="roundSel"><option value="">— pick season first —</option></select>
    <button class="btn" id="loadBtn" disabled>Load race</button>
  </div>

  <div id="content"><div class="empty">Select a season and round above, then click Load race.</div></div>

</div>

<script>
const TEAM_COLORS = {
  'Red Bull': '#3671C6', 'Ferrari': '#E8002D', 'Mercedes': '#27F4D2',
  'McLaren': '#FF8000', 'Aston Martin': '#229971', 'Alpine': '#0093CC',
  'Williams': '#64C4FF', 'AlphaTauri': '#5E8FAA', 'RB': '#6692FF',
  'Haas': '#B6BABD', 'Sauber': '#52E252', 'Kick Sauber': '#52E252',
  'Racing Bulls': '#6692FF', 'Alpine F1 Team': '#0093CC', 'Force India': '#FF80C7',
  'Renault': '#FFD800', 'Toro Rosso': '#469BFF', 'Lotus': '#FFB800'
};

const FINISHED_STATUSES = new Set(['Finished', '+1 Lap', '+2 Laps', '+3 Laps', '+4 Laps', '+5 Laps', '+6 Laps', '+7 Laps', '+8 Laps']);
const PENALTY_KEYWORDS = ['Penalty', 'Time penalty', 'Drive-through', 'Stop and Go', 'Disqualified', 'Excluded'];

function teamColor(name) {
  for (const [k,v] of Object.entries(TEAM_COLORS)) if (name && name.includes(k)) return v;
  return '#888';
}

function classifyStatus(status) {
  if (FINISHED_STATUSES.has(status)) return 'finished';
  if (PENALTY_KEYWORDS.some(k => status.includes(k))) return 'penalty';
  return 'dnf';
}

const BASE = 'https://api.jolpi.ca/ergast/f1';
let charts = [];

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

async function apiFetch(path) {
  const sep = path.includes('?') ? '&' : '?';
  const r = await fetch(BASE + path + sep + 'limit=2000');
  return r.json();
}

async function populateSeasons() {
  const sel = document.getElementById('seasonSel');
  for (let y = new Date().getFullYear(); y >= 2010; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y; sel.appendChild(o);
  }
  sel.addEventListener('change', loadRounds);
  loadRounds();
}

async function loadRounds() {
  const season = document.getElementById('seasonSel').value;
  const roundSel = document.getElementById('roundSel');
  roundSel.innerHTML = '<option>Loading...</option>';
  document.getElementById('loadBtn').disabled = true;
  try {
    const d = await apiFetch('/' + season + '/races');
    const races = d.MRData.RaceTable.Races;
    roundSel.innerHTML = '';
    races.forEach(r => {
      const o = document.createElement('option');
      o.value = r.round;
      o.textContent = r.round + ' — ' + r.raceName.replace(' Grand Prix', ' GP');
      roundSel.appendChild(o);
    });
    document.getElementById('loadBtn').disabled = false;
  } catch(e) {
    roundSel.innerHTML = '<option>Error loading</option>';
  }
}

async function loadRace() {
  const season = document.getElementById('seasonSel').value;
  const round = document.getElementById('roundSel').value;
  const btn = document.getElementById('loadBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  destroyCharts();
  document.getElementById('content').innerHTML = '<div class="loading">Fetching race data...</div>';

  try {
    const [resultsData, lapsData, pitsData] = await Promise.all([
      apiFetch('/' + season + '/' + round + '/results'),
      apiFetch('/' + season + '/' + round + '/laps'),
      apiFetch('/' + season + '/' + round + '/pitstops')
    ]);

    const race = resultsData.MRData.RaceTable.Races[0];
    const results = race.Results;
    const laps = lapsData.MRData.RaceTable.Races[0]?.Laps || [];
    const pits = pitsData.MRData.RaceTable.Races[0]?.PitStops || [];

    // Fetch driver photos from Wikipedia
    const driverPhotos = await fetchDriverPhotos(results.slice(0,3));

    renderRace(race, results, laps, pits, driverPhotos);
  } catch(e) {
    console.error(e);
    document.getElementById('content').innerHTML = '<div class="empty">Could not load race data. Try another round.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Load race';
}

async function tryWikiPhoto(query) {
  try {
    const url = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(query);
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    return data.thumbnail?.source || null;
  } catch(e) { return null; }
}

async function fetchDriverPhotos(top3) {
  const photos = {};
  await Promise.all(top3.map(async r => {
    const fullName = r.Driver.givenName + ' ' + r.Driver.familyName;
    const candidates = [
      fullName,
      fullName + ' (racing driver)',
      fullName + ' (Formula One)',
      r.Driver.familyName
    ];
    for (const c of candidates) {
      const photo = await tryWikiPhoto(c);
      if (photo) { photos[r.Driver.driverId] = photo; break; }
    }
  }));
  return photos;
}

function timeToMs(t) {
  if (!t) return null;
  const parts = t.split(':');
  if (parts.length === 2) return parseFloat(parts[0]) * 60000 + parseFloat(parts[1]) * 1000;
  return parseFloat(t) * 1000;
}

function renderRace(race, results, laps, pits, driverPhotos) {
  const top3 = results.slice(0,3);

  const pitMap = {};
  pits.forEach(p => {
    if (!pitMap[p.driverId]) pitMap[p.driverId] = [];
    pitMap[p.driverId].push(parseInt(p.lap));
  });

  const driverOrder = results.map(r => r.Driver.driverId);
  const positionByLap = {};
  driverOrder.forEach(id => positionByLap[id] = []);

  laps.forEach(lap => {
    lap.Timings.forEach(t => {
      if (positionByLap[t.driverId] !== undefined) {
        positionByLap[t.driverId].push(parseInt(t.position));
      }
    });
  });

  const numLaps = laps.length;
  const lapNums = Array.from({length: numLaps}, (_, i) => i + 1);

  const lapTimesByDriver = {};
  laps.forEach(lap => {
    lap.Timings.forEach(t => {
      if (!lapTimesByDriver[t.driverId]) lapTimesByDriver[t.driverId] = [];
      lapTimesByDriver[t.driverId].push(timeToMs(t.time));
    });
  });

  const top10 = results.slice(0, 10).map(r => r.Driver.driverId);

  function podiumCard(r, posClass, posNum) {
    if (!r) return '';
    const id = r.Driver.driverId;
    const col = teamColor(r.Constructor.name);
    const photoHtml = driverPhotos[id]
      ? `<img class="podium-photo" src="${driverPhotos[id]}" alt="${r.Driver.familyName}" style="border-color:${col}">`
      : `<div class="podium-photo-placeholder" style="border-color:${col}">${r.Driver.familyName[0]}</div>`;
    return `
      <div class="podium-step">
        ${photoHtml}
        <div class="podium-name">${r.Driver.givenName[0]}. ${r.Driver.familyName}</div>
        <div class="podium-team-label" style="color:${col}">${r.Constructor.name}</div>
        <div class="podium-block ${posClass}">${posNum}</div>
      </div>`;
  }

  const html = `
    <div class="race-title">${race.raceName}</div>
    <div class="race-sub">${race.Circuit.circuitName} &nbsp;·&nbsp; ${new Date(race.date).toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}</div>

    <div class="tabs">
      <button class="tab-btn active" data-pane="overview">Overview</button>
      <button class="tab-btn" data-pane="positions">Position tracker</button>
      <button class="tab-btn" data-pane="laptimes">Lap times</button>
      <button class="tab-btn" data-pane="pitstops">Pit stops</button>
      <button class="tab-btn" data-pane="incidents">Incidents</button>
    </div>

    <div id="pane-overview" class="tab-pane active">
      <div class="grid2">
        <div class="card">
          <div class="card-title">Podium</div>
          <div class="podium">
            ${podiumCard(top3[1], 'p2', 2)}
            ${podiumCard(top3[0], 'p1', 1)}
            ${podiumCard(top3[2], 'p3', 3)}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Race info</div>
          ${[
            ['Circuit', race.Circuit.circuitName],
            ['Location', race.Circuit.Location.locality + ', ' + race.Circuit.Location.country],
            ['Total laps', numLaps || results[0]?.laps || '—'],
            ['Winner time', results[0]?.Time?.time || results[0]?.status || '—'],
            ['Fastest lap', (() => { const f = results.find(r=>r.FastestLap?.rank==='1'); return f ? f.Driver.familyName + ' — ' + f.FastestLap.Time.time : '—'; })()],
          ].map(([k,v]) => `<div class="stat-row"><span class="stat-key">${k}</span><span class="stat-val">${v}</span></div>`).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-title">Full results</div>
        <table>
          <thead><tr><th>Pos</th><th>Driver</th><th>Team</th><th>Laps</th><th>Gap / Time</th><th>Pts</th></tr></thead>
          <tbody>
            ${results.map(r => {
              const col = teamColor(r.Constructor.name);
              const pb = r.position==='1'?'p1b':r.position==='2'?'p2b':r.position==='3'?'p3b':'';
              const pitsCount = (pitMap[r.Driver.driverId]||[]).length;
              const pitsLabel = pitsCount > 0 ? `<span class="pit-stop">${pitsCount} stop${pitsCount>1?'s':''}</span>` : '';
              const gap = r.position==='1' ? (r.Time?.time || '—') : (r.Time?.time ? '+'+r.Time.time : '—');
              const statusType = classifyStatus(r.status);
              const statusBadge = statusType === 'penalty'
                ? `<span class="incident-badge" style="margin-left:6px">${r.status}</span>`
                : statusType === 'dnf'
                  ? `<span class="dnf-badge" style="margin-left:6px">${r.status}</span>`
                  : '';
              return `<tr>
                <td><span class="pos-badge ${pb}">${r.position}</span></td>
                <td><span class="driver-name">${r.Driver.givenName[0]}. ${r.Driver.familyName}</span>${pitsLabel}${statusBadge}</td>
                <td><span class="muted"><span class="team-dot" style="background:${col}"></span>${r.Constructor.name}</span></td>
                <td class="muted">${r.laps}</td>
                <td class="muted" style="font-size:12px">${gap}</td>
                <td style="font-weight:500;color:#fff">${r.points}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div id="pane-positions" class="tab-pane">
      <div class="card">
        <div class="card-title">Position changes — lap by lap (top 10)</div>
        <div class="legend" id="posLegend"></div>
        <div class="chart-wrap-tall"><canvas id="posChart"></canvas></div>
        <div class="chart-note">Hover over the chart to see each driver's position on that lap.</div>
      </div>
    </div>

    <div id="pane-laptimes" class="tab-pane">
      <div class="card">
        <div class="card-title">Lap times — top 10 drivers</div>
        <div class="legend" id="lapLegend"></div>
        <div class="chart-wrap-tall"><canvas id="lapChart"></canvas></div>
        <div class="chart-note">Pit in/out laps are filtered out. Hover to see each driver's lap time.</div>
      </div>
    </div>

    <div id="pane-pitstops" class="tab-pane">
      <div class="card">
        <div class="card-title">Pit stop summary</div>
        ${pits.length === 0 ? '<div class="empty">No pit stop data for this race.</div>' : `
        <table>
          <thead><tr><th>Driver</th><th>Stop</th><th>Lap</th><th>Duration</th><th>Time of day</th></tr></thead>
          <tbody>
            ${pits.sort((a,b) => parseInt(a.lap)-parseInt(b.lap)).map(p => {
              const res = results.find(r => r.Driver.driverId === p.driverId);
              const col = teamColor(res?.Constructor?.name);
              return `<tr>
                <td><span class="team-dot" style="background:${col}"></span><span class="driver-name">${res?.Driver.givenName[0]||''}. ${res?.Driver.familyName||p.driverId}</span></td>
                <td class="muted">${p.stop}</td>
                <td style="font-weight:500;color:#fff">Lap ${p.lap}</td>
                <td style="color:#e10600;font-weight:500">${p.duration}s</td>
                <td class="muted">${p.time}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    </div>

    <div id="pane-incidents" class="tab-pane">
      <div class="card">
        <div class="card-title">Incidents, penalties &amp; retirements</div>
        ${(() => {
          const flagged = results.filter(r => classifyStatus(r.status) !== 'finished');
          if (flagged.length === 0) {
            return '<div class="empty">No incidents, penalties, or retirements recorded for this race.</div>';
          }
          return `
          <table>
            <thead><tr><th>Driver</th><th>Team</th><th>Final pos</th><th>Type</th><th>Details</th></tr></thead>
            <tbody>
              ${flagged.map(r => {
                const col = teamColor(r.Constructor.name);
                const statusType = classifyStatus(r.status);
                const typeLabel = statusType === 'penalty'
                  ? '<span class="incident-badge">Penalty</span>'
                  : '<span class="dnf-badge">Retirement</span>';
                return `<tr>
                  <td><span class="driver-name">${r.Driver.givenName[0]}. ${r.Driver.familyName}</span></td>
                  <td><span class="muted"><span class="team-dot" style="background:${col}"></span>${r.Constructor.name}</span></td>
                  <td class="muted">${r.position}</td>
                  <td>${typeLabel}</td>
                  <td class="muted" style="font-size:12px">${r.status} &nbsp;·&nbsp; completed ${r.laps} laps</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;
        })()}
      </div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pane-' + btn.dataset.pane).classList.add('active');
      if (btn.dataset.pane === 'positions') renderPosChart(results, positionByLap, lapNums, top10);
      if (btn.dataset.pane === 'laptimes') renderLapChart(results, lapTimesByDriver, lapNums, top10);
    });
  });
}

function renderPosChart(results, positionByLap, lapNums, top10) {
  if (document.getElementById('posChart')._chartInstance) return;
  const legend = document.getElementById('posLegend');
  const datasets = top10.map(id => {
    const res = results.find(r => r.Driver.driverId === id);
    const col = teamColor(res?.Constructor?.name);
    const name = (res?.Driver.givenName[0]||'') + '. ' + (res?.Driver.familyName||id);
    legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${name}</div>`;
    return {
      label: name,
      data: positionByLap[id] || [],
      borderColor: col,
      backgroundColor: col + '22',
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.3,
    };
  });

  const ctx = document.getElementById('posChart').getContext('2d');
  const c = new Chart(ctx, {
    type: 'line',
    data: { labels: lapNums, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: {
          reverse: true, min: 1, max: 20,
          title: { display: true, text: 'Position', color: '#666', font: { size: 12 } },
          ticks: { color: '#666', stepSize: 1, callback: v => 'P' + v },
          grid: { color: '#1e1e1e' }
        },
        x: {
          title: { display: true, text: 'Lap', color: '#666', font: { size: 12 } },
          ticks: { color: '#666', maxTicksLimit: 20 },
          grid: { color: '#1e1e1e' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          backgroundColor: '#1a1a1a',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#fff',
          titleFont: { size: 11 },
          callbacks: {
            title: items => 'Lap ' + items[0].label,
            label: item => ' ' + item.dataset.label + ' — P' + item.raw,
          }
        }
      }
    }
  });
  document.getElementById('posChart')._chartInstance = true;
  charts.push(c);
}

function renderLapChart(results, lapTimesByDriver, lapNums, top10) {
  if (document.getElementById('lapChart')._chartInstance) return;
  const legend = document.getElementById('lapLegend');

  const datasets = top10.map(id => {
    const res = results.find(r => r.Driver.driverId === id);
    const col = teamColor(res?.Constructor?.name);
    const name = (res?.Driver.givenName[0]||'') + '. ' + (res?.Driver.familyName||id);
    legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${name}</div>`;

    const times = (lapTimesByDriver[id] || []).map(ms => ms ? ms / 1000 : null);
    const valid = times.filter(t => t !== null);
    const sorted = [...valid].sort((a,b) => a-b);
    const median = sorted[Math.floor(sorted.length/2)] || 90;
    const filtered = times.map(t => (t && t < median * 1.3) ? t : null);

    return {
      label: name,
      data: filtered,
      borderColor: col,
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.2,
      spanGaps: false,
    };
  });

  const ctx = document.getElementById('lapChart').getContext('2d');
  const c = new Chart(ctx, {
    type: 'line',
    data: { labels: lapNums, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: {
          title: { display: true, text: 'Lap time', color: '#666', font: { size: 12 } },
          ticks: {
            color: '#666',
            callback: v => {
              const m = Math.floor(v / 60);
              const s = (v % 60).toFixed(1);
              return m + ':' + s.padStart(4,'0');
            }
          },
          grid: { color: '#1e1e1e' }
        },
        x: {
          title: { display: true, text: 'Lap', color: '#666', font: { size: 12 } },
          ticks: { color: '#666', maxTicksLimit: 20 },
          grid: { color: '#1e1e1e' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          backgroundColor: '#1a1a1a',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: '#fff',
          titleFont: { size: 11 },
          filter: item => item.raw !== null,
          callbacks: {
            title: items => 'Lap ' + items[0].label,
            label: item => {
              const v = item.raw;
              const m = Math.floor(v / 60);
              const s = (v % 60).toFixed(3);
              return ' ' + item.dataset.label + ' — ' + m + ':' + s.padStart(6,'0');
            }
          }
        }
      }
    }
  });
  document.getElementById('lapChart')._chartInstance = true;
  charts.push(c);
}

populateSeasons();
